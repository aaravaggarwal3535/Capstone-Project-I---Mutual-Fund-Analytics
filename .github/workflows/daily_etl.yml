name: Daily Bluestock ETL Pipeline

on:
  schedule:
    - cron: '0 14 * * 1-5' # Runs at 14:00 UTC (approx 7:30 PM IST) Monday-Friday
  workflow_dispatch: # Allows you to click a "Run" button manually on GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install Dependencies
      run: pip install -r requirements.txt
        
    - name: Run Master Pipeline
      run: python run_pipeline.py
        
    - name: Commit and Push Updated Database
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add db/bluestock_mf.db
        git commit -m "Automated daily ETL database update" || echo "No changes to commit"
        git push